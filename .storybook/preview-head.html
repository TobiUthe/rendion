<!-- Google Fonts: Work Sans, Libre Baskerville, IBM Plex Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap"
  rel="stylesheet"
/>

<style>
  :root {
    --font-work-sans: "Work Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    --font-ibm-plex-mono: "IBM Plex Mono", ui-monospace, monospace;
    --font-libre-baskerville: "Libre Baskerville", Georgia, serif;
  }

  body {
    font-family: "Work Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
</style>

<script>
  (function () {
    try {
      var t = localStorage.getItem("rnd_theme");
      if (t === "dark" || t === "light") {
        document.documentElement.setAttribute("data-theme", t);
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.setAttribute("data-theme", "light");
      }
    } catch (e) {}
  })();
</script>
